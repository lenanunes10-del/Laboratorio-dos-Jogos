<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Galo | Laboratório de Jogos</title>
    <style>
    
        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            display: flex; 
            flex-direction: column; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            text-align: center; 
            background-color: #ffffff; 
            color: #1d1d1f; 
        }

        .game-header { padding: 80px 20px 20px; }
        .back-link { 
            color: #0066cc; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 0.9rem; 
            display: inline-block;
            margin-bottom: 15px;
        }
        h1 { font-size: 3.2rem; font-weight: 700; margin: 0; letter-spacing: -1.5px; text-transform: uppercase; }

        .main-content { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .control-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .button-group { 
            background: #f5f5f7; 
            padding: 6px; 
            border-radius: 30px; 
            display: inline-flex; 
            gap: 5px;
            border: 1px solid #e5e5e5;
        }

        .mode-btn, .reset-btn { 
            padding: 10px 22px; 
            cursor: pointer; 
            border: none; 
            background: transparent; 
            color: #1d1d1f; 
            border-radius: 25px; 
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .active-blue { 
            background-color: #0071e3 !important; 
            color: #ffffff !important; 
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3); 
        }

        .board { display: grid; grid-template-columns: repeat(3, 110px); grid-gap: 15px; margin-bottom: 30px; }
        .cell { 
            width: 110px; height: 110px; background: #f5f5f7; border-radius: 22px; 
            font-size: 3rem; font-weight: 700; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.2s;
        }
        .cell:empty:hover { background: #e8e8ed; transform: scale(1.02); }
        .cell.x { color: #0071e3; } 
        .cell.o { color: #ff3b30; }

        #status { font-size: 1.3rem; font-weight: 600; height: 40px; color: #86868b; margin-bottom: 20px; }

    
        .baseboard { width: 100%; text-align: center; padding: 60px 0; background-color: #f5f5f7; border-top: 1px solid #e5e5e5; }
        .baseboard p { margin: 8px 0; font-size: 1rem; }
        .baseboard a { color: #0066cc; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="game-header">
        <a href="index.html" class="back-link" data-pt="← Voltar ao Menu" data-en="← Back to Menu">← Voltar ao Menu</a>
        <h1 data-pt="Jogo do Galo" data-en="Tic-Tac-Toe">Jogo do Galo</h1>
    </div>

    <div class="main-content">
        <div class="control-panel">
            <div class="button-group">
                <button id="p-vs-p" class="mode-btn active-blue" onclick="setMode('pvp')" data-pt="2 Jogadores" data-en="2 Players">2 Jogadores</button>
                <button id="p-vs-c" class="mode-btn" onclick="setMode('pvc')" data-pt="Computador" data-en="Computer">Computador</button>
            </div>
            
            <div class="button-group">
                <button id="reset-btn" class="reset-btn" onclick="handleReset(this)" data-pt="Reiniciar" data-en="Restart">Reiniciar</button>
            </div>
        </div>

        <div id="status"></div>

        <div class="board" id="board">
            <div class="cell" onclick="handleMove(this, 0)"></div>
            <div class="cell" onclick="handleMove(this, 1)"></div>
            <div class="cell" onclick="handleMove(this, 2)"></div>
            <div class="cell" onclick="handleMove(this, 3)"></div>
            <div class="cell" onclick="handleMove(this, 4)"></div>
            <div class="cell" onclick="handleMove(this, 5)"></div>
            <div class="cell" onclick="handleMove(this, 6)"></div>
            <div class="cell" onclick="handleMove(this, 7)"></div>
            <div class="cell" onclick="handleMove(this, 8)"></div>
        </div>
    </div>

    <footer class="baseboard">
        <p><strong>Email:</strong> lenanunes10@hotmail.com | <strong>LinkedIn:</strong> <a href="https://www.linkedin.com/in/helena-viveiros-6a60371b6" target="_blank">helena-nunes</a></p>
        <p style="color: #86868b;" data-pt="Lisboa, Portugal" data-en="Lisbon, Portugal">Lisboa, Portugal</p>
    </footer>

    <script>
        let currentPlayer = 'X', boardState = ["","","","","","","","",""], gameActive = true, gameMode = 'pvp';
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

        function setMode(m) { 
            gameMode = m; 
            const pvpBtn = document.getElementById('p-vs-p');
            const pvcBtn = document.getElementById('p-vs-c');

            if (m === 'pvp') {
                pvpBtn.classList.add('active-blue');
                pvcBtn.classList.remove('active-blue');
            } else {
                pvcBtn.classList.add('active-blue');
                pvpBtn.classList.remove('active-blue');
            }
            resetBoard(); 
        }

        function handleReset(btn) {
            btn.classList.add('active-blue');
            setTimeout(() => {
                btn.classList.remove('active-blue');
            }, 200); // Button turns blue for 200ms when clicked
            resetBoard();
        }

        function handleMove(cell, idx) {
            if (boardState[idx] !== "" || !gameActive) return;
            makeMove(cell, idx);
            if (gameActive && gameMode === 'pvc' && currentPlayer === 'O') {
                setTimeout(computerMove, 500);
            }
        }

        function makeMove(cell, idx) {
            boardState[idx] = currentPlayer;
            cell.innerText = currentPlayer;
            cell.classList.add(currentPlayer.toLowerCase());
            checkResult();
        }

        function computerMove() {
            let move = findBestMove('O'); // Try to win
            if (move === -1) move = findBestMove('X'); // Try to block
            if (move === -1 && boardState[4] === "") move = 4; // Take center
            
            if (move === -1) {
                let avail = boardState.map((v, i) => v === "" ? i : null).filter(v => v !== null);
                move = avail[Math.floor(Math.random() * avail.length)];
            }

            if (move !== -1) {
                makeMove(document.querySelectorAll('.cell')[move], move);
            }
        }

        function findBestMove(symbol) {
            for (let condition of wins) {
                const [a, b, c] = condition;
                const values = [boardState[a], boardState[b], boardState[c]];
                if (values.filter(v => v === symbol).length === 2 && values.filter(v => v === "").length === 1) {
                    return condition[values.indexOf("")];
                }
            }
            return -1;
        }

        function checkResult() {
            let win = false;
            for (let condition of wins) {
                if (boardState[condition[0]] && boardState[condition[0]] === boardState[condition[1]] && boardState[condition[0]] === boardState[condition[2]]) { 
                    win = true; 
                    break; 
                }
            }
            
            const lang = localStorage.getItem('selectedLang') || 'pt';
            const statusEl = document.getElementById('status');

            if (win) {
                statusEl.innerText = (lang==='pt' ? "Vitória do Jogador " : "Player ") + currentPlayer + "!";
                statusEl.style.color = currentPlayer === 'X' ? "#0071e3" : "#ff3b30";
                gameActive = false; 
                return;
            }
            
            if (!boardState.includes("")) { 
                statusEl.innerText = lang==='pt'?"Empate!":"It's a Draw!"; 
                statusEl.style.color = "#86868b";
                gameActive = false; 
                return; 
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            statusEl.innerText = (lang==='pt'?"Vez do Jogador ":"Turn: Player ") + currentPlayer;
        }

        function resetBoard() {
            currentPlayer = 'X'; 
            boardState = ["","","","","","","","",""]; 
            gameActive = true;
            const lang = localStorage.getItem('selectedLang') || 'pt';
            const statusEl = document.getElementById('status');
            statusEl.innerText = lang==='pt'?"Vez do Jogador X":"Turn: Player X";
            statusEl.style.color = "#86868b";
            document.querySelectorAll('.cell').forEach(c => { 
                c.innerText = ""; 
                c.classList.remove('x','o'); 
            });
        }

        window.onload = () => {
            const lang = localStorage.getItem('selectedLang') || 'pt';
            document.querySelectorAll('[data-pt]').forEach(el => {
                el.innerText = el.getAttribute(`data-${lang}`);
            });
            resetBoard();
        };
    </script>
</body>
</html>
