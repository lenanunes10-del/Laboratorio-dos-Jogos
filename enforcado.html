<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enforcado | Helena Nunes</title>
    <style>
       
        html, body { 
            height: 100%; margin: 0; display: flex; flex-direction: column; 
            background-color: #000; color: #fff; overflow: hidden;
        }
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; text-align: center;
            background-image: radial-gradient(circle, #111 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .game-header { padding: 40px 20px 10px; z-index: 10; }
        .back-link { color: #0066cc; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        h1 { margin: 15px 0 5px; font-size: 2.5rem; color: #fff; text-shadow: 0 0 10px rgba(0, 113, 227, 0.5); }

        .main-content { 
            flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

       
        .instruction-text { 
            font-size: 1.1rem; 
            color: #86868b; 
            margin-bottom: 40px; 
        }

       
        #hangman-display { 
            font-size: 3.5rem; 
            margin-bottom: 80px; 
            font-family: 'Courier New', Courier, monospace; 
            letter-spacing: 15px; 
            font-weight: bold;
            color: #0071e3;
            text-shadow: 0 0 15px rgba(0, 113, 227, 0.5);
        }

        /* KEYBOARD */
        #letters-container { 
            max-width: 650px;
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 12px; 
            margin-bottom: 40px; 
        }
        
        .letter-btn { 
            width: 48px; height: 48px; font-size: 1.2rem; cursor: pointer; 
            background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 8px; 
            transition: all 0.2s; text-transform: uppercase; font-weight: bold;
        }
        .letter-btn:hover:not(:disabled) { background-color: #222; border-color: #0071e3; transform: scale(1.05); }
        .letter-btn.correct { background: #0071e3; color: white; border-color: #0071e3; box-shadow: 0 0 10px #0071e3; }
        .letter-btn.wrong { background: #ff3b30; color: white; border-color: #ff3b30; box-shadow: 0 0 10px #ff3b30; opacity: 0.6; }
        .letter-btn:disabled { cursor: not-allowed; }

      
        .info-panel {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #fff;
        }

        #status { margin-top: 25px; font-size: 1.4rem; font-weight: bold; min-height: 35px; }
        
        .reset-btn { 
            margin-top: 40px; /* Pushed down for better balance */
            padding: 14px 45px; background: transparent; 
            color: #0071e3; border: 2px solid #0071e3; border-radius: 30px; 
            cursor: pointer; font-weight: 600; font-size: 1.1rem;
            transition: 0.3s;
        }
        .reset-btn:hover { background: #0071e3; color: white; box-shadow: 0 0 15px rgba(0, 113, 227, 0.5); }

        .baseboard { width: 100%; text-align: center; padding: 40px 0; background-color: #000; border-top: 1px solid #222; margin-top: auto; }
        .baseboard a { color: #0066cc; text-decoration: none; }
    </style>
</head>
<body>

    <header class="game-header">
        <a href="index.html" class="back-link" data-pt="← Voltar ao Menu" data-en="← Back to Menu">← Voltar ao Menu</a>
        <h1 data-pt="Jogo do Enforcado" data-en="Hangman Game">Jogo do Enforcado</h1>
    </header>

    <div class="main-content">
        <p class="instruction-text" data-pt="Adivinhe a palavra secreta:" data-en="Guess the secret word:">Adivinhe a palavra secreta:</p>
        
        <div id="hangman-display">_ _ _ _</div>
        
        <div id="letters-container"></div>
        
        <div class="info-panel">
            <span data-pt="Tentativas restantes: " data-en="Attempts remaining: ">Tentativas restantes: </span>
            <span id="lives" style="color:#ff3b30; font-weight:bold; font-size: 1.6rem; margin-left: 10px;">6</span>
        </div>

        <div id="status"></div>
        
        <button onclick="startGame()" class="reset-btn" data-pt="Nova Palavra" data-en="New Word">Nova Palavra</button>
    </div>

    <footer class="baseboard">
        <p><strong>Email:</strong> lenanunes10@hotmail.com | <strong>LinkedIn:</strong> <a href="https://www.linkedin.com/in/helena-viveiros-6a60371b6" target="_blank">helena-nunes</a></p>
    </footer>

    <script>
        const wordLists = {
            pt: ["JAVASCRIPT", "COMPUTADOR", "ALGORITMO", "TECLADO", "INTERNET", "PROGRAMA", "LABIRINTO", "PORTUGAL", "TECNOLOGIA", "UNIVERSO"],
            en: ["JAVASCRIPT", "COMPUTER", "ALGORITHM", "KEYBOARD", "INTERNET", "SOFTWARE", "LABYRINTH", "MYSTERY", "TECHNOLOGY", "UNIVERSE"]
        };

        let selectedWord, guessedLetters, lives;

        function startGame() {
            const lang = localStorage.getItem('selectedLang') || 'pt';
            const currentList = wordLists[lang];
            
            selectedWord = currentList[Math.floor(Math.random() * currentList.length)].toUpperCase();
            guessedLetters = [];
            lives = 6;
            
            document.getElementById('lives').innerText = lives;
            document.getElementById('status').innerText = "";
            setupLetters();
            updateDisplay();
        }

        function setupLetters() {
            const container = document.getElementById('letters-container');
            container.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
                const b = document.createElement('button');
                b.innerText = l; 
                b.className = 'letter-btn'; 
                b.onclick = () => guess(l, b);
                container.appendChild(b);
            });
        }

        function guess(letter, btn) {
            btn.disabled = true;
            if (selectedWord.includes(letter)) {
                guessedLetters.push(letter);
                btn.classList.add('correct');
                updateDisplay();
                checkWin();
            } else {
                lives--;
                btn.classList.add('wrong');
                document.getElementById('lives').innerText = lives;
                checkLoss();
            }
        }

        function updateDisplay() {
            const display = selectedWord.split('').map(l => 
                guessedLetters.includes(l) ? l : "_"
            ).join(' ');
            document.getElementById('hangman-display').innerText = display;
        }

        function checkWin() {
            if (!document.getElementById('hangman-display').innerText.includes('_')) {
                const lang = localStorage.getItem('selectedLang') || 'pt';
                const status = document.getElementById('status');
                status.innerText = lang === 'pt' ? "Ganhou! ✨" : "You Won! ✨";
                status.style.color = "#0071e3";
                disableAll();
            }
        }

        function checkLoss() {
            if (lives <= 0) {
                const lang = localStorage.getItem('selectedLang') || 'pt';
                const status = document.getElementById('status');
                const msg = lang === 'pt' ? "Perdeu! A palavra era: " : "Game Over! The word was: ";
                status.innerText = msg + selectedWord;
                status.style.color = "#ff3b30";
                disableAll();
            }
        }

        function disableAll() { 
            document.querySelectorAll('.letter-btn').forEach(b => b.disabled = true); 
        }

        window.onload = () => {
            const lang = localStorage.getItem('selectedLang') || 'pt';
            document.querySelectorAll('[data-pt]').forEach(el => {
                el.innerText = el.getAttribute(`data-${lang}`);
            });
            startGame();
        };
    </script>
</body>
   </html> 
</html>
