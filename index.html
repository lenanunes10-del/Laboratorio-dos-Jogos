<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório de Jogos | Helena Nunes</title>
    <style>
        
        html, body { 
            height: 100%; 
            margin: 0; 
            overflow-x: hidden; 
            background-color: #000000; 
        }
        body { 
            display: flex; 
            flex-direction: column; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: #ffffff; 
        }

    
        .page-wrapper {
            flex: 1;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(0, 150, 255, .05) 25%, rgba(0, 150, 255, .05) 26%, transparent 27%, transparent 74%, rgba(0, 150, 255, .05) 75%, rgba(0, 150, 255, .05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 150, 255, .05) 25%, rgba(0, 150, 255, .05) 26%, transparent 27%, transparent 74%, rgba(0, 150, 255, .05) 75%, rgba(0, 150, 255, .05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lang-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        .lang-btn {
            padding: 10px 20px;
            background: #1d1d1f;
            color: white;
            border: 1px solid #444;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .lang-btn:hover { background: #0066cc; }

        .header-title { 
            text-align: center; 
            font-size: 3.5rem; 
            padding: 100px 20px 10px; 
            margin: 0; 
            font-weight: 700; 
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 15px rgba(0, 150, 255, 0.6);
            letter-spacing: -1px;
        }

        .subtitle { 
            text-align: center; 
            font-size: 1.4rem; 
            color: #86868b; 
            margin-bottom: 50px;
            font-style: italic; 
        }

        .games-container {
            display: flex;
            gap: 45px;
            justify-content: center;
            flex-wrap: wrap;
            perspective: 1200px;
            padding-bottom: 80px;
        }

        .arcade-card {
            width: 280px;
            background: #111;
            border-left: 15px solid #080808;
            border-right: 2px solid #333;
            border-top: 4px solid #222;
            border-bottom: 10px solid #000;
            border-radius: 4px;
            text-decoration: none;
            position: relative;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            transform: rotateY(-5deg);
            display: block;
        }

        .arcade-card:hover {
            transform: rotateY(0deg) scale(1.05) translateY(-20px);
            box-shadow: 0 30px 60px rgba(0, 102, 204, 0.5); 
            z-index: 10;
        }

        .arcade-header {
            background: #000;
            padding: 15px 10px;
            border-bottom: 5px solid #333;
            text-align: center;
        }

        .arcade-header h3 {
            margin: 0;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            color: #fff;
        }

    
        .arcade-screen {
            margin: 15px;
            height: 180px;
            background: #020b02;
            border: 10px solid #222;
            border-radius: 40px / 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0, 255, 0, 0.15);
        }

        .arcade-screen::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2;
        }

        .screen-text {
            text-align: center;
            font-family: 'Courier New', 'Courier', monospace;
            font-weight: 900;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 15px;
            z-index: 1;
           
            animation: blink-insert 1.5s step-end infinite;
            pointer-events: none;
        }

        
        .arcade-card:hover .screen-text {
            animation-play-state: paused;
            opacity: 1 !important; 
        }

        .screen-text p { 
            margin: 0; 
            padding: 0;
            font-size: 1.1rem; 
            color: #00ff00;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.8);
            transform: perspective(300px) rotateX(5deg);
            line-height: 1.2;
        }

        .screen-text .title-p {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        @keyframes blink-insert { 
            50% { opacity: 0.1; } 
        }

        .arcade-controls {
            background: #1a1a1a;
            height: 65px;
            border-top: 5px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            padding: 0 15px;
        }

        .joystick {
            width: 22px; height: 22px;
            background: #d00;
            border-radius: 50%;
            box-shadow: 0 4px 0 #700;
        }

        .button-red {
            width: 16px; height: 16px;
            border-radius: 50%;
            background: #ff3b30;
            box-shadow: 0 3px 0 #b3241d;
        }

       
        .baseboard { 
            width: 100%; 
            text-align: center; 
            padding: 60px 0; 
            background-color: #000; 
            border-top: 1px solid #222; 
        }
        .baseboard p { margin: 8px 0; font-size: 1rem; color: #fff; }
        .baseboard a { color: #0066cc; text-decoration: none; font-weight: 600; }
        .location { color: #86868b; font-size: 0.9rem; margin-top: 10px; }

        @media (max-width: 768px) {
            .header-title { font-size: 2.5rem; }
            .arcade-card { transform: none; margin-bottom: 30px; }
        }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button class="lang-btn" onclick="toggleLanguage()">PT / EN </button>
    </div>

    <div class="page-wrapper">
        <h1 class="header-title" data-pt="LABORATÓRIO DE JOGOS" data-en="GAME LAB">LABORATÓRIO DE JOGOS</h1>
        <p class="subtitle" data-pt="Queres jogar um jogo?" data-en="Wanna play a game?">queres jogar um jogo?</p>

        <section class="games-container">
    
            <a href="maze.html" class="arcade-card">
                <div class="arcade-header" style="border-bottom-color: #0066cc;">
                    <h3 data-pt="LABIRINTO DE ENIGMAS" data-en="MAZE OF RIDDLES" style="text-shadow: 0 0 10px #0066cc;">LABIRINTO DE ENIGMAS</h3>
                </div>
                <div class="arcade-screen">
                    <div class="screen-text">
                        <p class="title-p" data-pt="5 Níveis de labirintos e enigmas" data-en="5 Levels of mazes and riddles">5 Níveis de labirintos e enigmas</p>
                    </div>
                </div>
                <div class="arcade-controls">
                    <div class="joystick"></div>
                    <div style="display: flex; gap: 6px;">
                        <div class="button-red"></div>
                        <div class="button-red"></div>
                    </div>
                </div>
            </a>

            <a href="enforcado.html" class="arcade-card" style="cursor: default;">
                <div class="arcade-header" style="border-bottom-color: #0071e3;">
                    <h3 data-pt="ENFORCADO" data-en="HANGMAN" style="text-shadow: 0 0 10px #0071e3;">ENFORCADO</h3>
                </div>
                <div class="arcade-screen">
                    <div class="screen-text">
                        <p data-pt="Adivinha a palavra" data-en="Try to guess the word">Adivinha a palavra</p>
                    </div>
                </div>
                <div class="arcade-controls">
                    <div class="joystick"></div>
                    <div style="display: flex; gap: 6px;">
                        <div class="button-red"></div>
                        <div class="button-red"></div>
                    </div>
                </div>
            </a>

            <a href="galo.html" class="arcade-card" style="cursor: default;">
                <div class="arcade-header" style="border-bottom-color: #0071e3;">
                    <h3 data-pt="JOGO DO GALO" data-en="TIC TAC TOE" style="text-shadow: 0 0 10px #0071e3;">JOGO DO GALO</h3>
                </div>
                <div class="arcade-screen">
                    <div class="screen-text">
                        <p data-pt="Joga com um amigo ou contra o computador" data-en="Play with a friend or against the computer">Joga com um amigo ou contra o computador</p>
                    </div>
                </div>
                <div class="arcade-controls">
                    <div class="joystick"></div>
                    <div style="display: flex; gap: 6px;">
                        <div class="button-red"></div>
                        <div class="button-red"></div>
                    </div>
                </div>
            </a>

        </section>
    </div>
            
    <footer class="baseboard">
        <p>
            <strong>Email:</strong> lenanunes10@hotmail.com | 
            <strong>LinkedIn:</strong> <a href="https://www.linkedin.com/in/helena-viveiros-6a60371b6" target="_blank">helena-nunes</a>
        </p>
        <p class="location" data-pt="Lisboa, Portugal" data-en="Lisbon, Portugal">Lisboa, Portugal</p>
    </footer>

    <script>
        let currentLang = localStorage.getItem('selectedLang') || 'pt';

        window.onload = () => {
            applyLanguage(currentLang);
        };

        function toggleLanguage() {
            currentLang = currentLang === 'pt' ? 'en' : 'pt';
            localStorage.setItem('selectedLang', currentLang);
            applyLanguage(currentLang);
        }

        function applyLanguage(lang) {
            const elements = document.querySelectorAll('[data-pt]');
            elements.forEach(el => {
                const text = el.getAttribute(`data-${lang}`);
                if (text) el.innerText = text;
            });
        }
    </script>
</body>
</html>
